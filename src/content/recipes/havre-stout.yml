content:
  sv:
    name: Havre Stout
    style: Havrestout
    tagline: Len struktur och fylliga rostade chokladsmaker – ett tröstande vinteröl.
    description: |
      Med en oemotståndlig len struktur och fylliga rostade chokladsmaker är Havrestout ett utsökt, tröstande öl att njuta av under de mörka vintermånaderna.

      Den valsade havren ger ölet sin karaktäristiska silkeslena kropp. Generösa mängder chokladmalt och rostat korn bygger upp den mörka färgen och den bitterchocoladiga avslutningen.

      > Tips: Havren gör att ölet lättare slår av sig – undvik att plaska när du tappar på flaska. 🍺
  en:
    name: Oat Stout
    style: Oat Stout
    tagline: Silky smooth with rich roasted chocolate notes — a comforting winter beer.
    description: |
      With an irresistibly smooth texture and full roasted chocolate flavours, the Oat Stout is an exquisite, comforting beer to enjoy through the dark winter months.

      The rolled oats give the beer its characteristic silky body. A generous addition of chocolate malt and roasted barley builds the dark colour and bitter-chocolate finish.

      > Tip: The oats make the beer prone to oxidation — avoid splashing when bottling. 🍺
