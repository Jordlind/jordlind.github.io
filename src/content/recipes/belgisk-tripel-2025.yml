content:
  sv:
    name: Belgisk Tripel 2025
    style: Belgisk Tripel
    tagline: Lurigt lättdrucken och gyllene – stark, torr och farligt god.
    description: |
      Tack vare en mindre komplex maltsmak än kusinen Dubbel har belgisk Tripel en frisk, sträv eftersmak. Trots den höga alkoholhalten är smaken inte bedövande – gyllene, pärlande och farligt lättdrucken.

      Chokladmalten ger ett ytterst diskret djup utan att mörkna färgen nämnvärt, medan kandisockret håller kroppen lätt och avslutningen torr.

      > Stark, gyllene och lurigt mjuk. Skål! 🍺
  en:
    name: Belgisk Tripel 2025
    style: Belgisk Tripel
    tagline: Deceptively smooth and golden — strong, dry and dangerously drinkable.
    description: |
      Thanks to a less complex malt character than its cousin the Dubbel, the Belgian Tripel finishes fresh and crisp. Despite the high alcohol it never tastes heavy — golden, sparkling and dangerously easy to drink.

      The chocolate malt adds the faintest hint of depth without darkening the colour significantly, while the candi sugar keeps the body light and the finish dry.

      > Strong, golden and deceptively gentle. Skål! 🍺
