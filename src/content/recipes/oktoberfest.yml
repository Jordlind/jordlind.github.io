content:
  sv:
    name: Oktoberfest
    style: Märzen / Oktoberfest
    tagline: Bryggd på våren, lagras över sommaren — ett friskt bavariskt amberlager för hösten.
    description: |
      Det här tyska amberlagret bryggas enligt traditionen på våren, lagras i svala källare eller grottor över sommaren, och dricks vid Oktoberfest under hösten.

      Rik maltsmak från Wienermalt och Münchenermalt ger en varm amberfärg och en len, brödig avslutning. Ädla humlen håller beskan ren och diskret.

      > Bäst efter en ordentlig kall lagringsperiod. Tålamod är ingrediensen som gör den riktigt god. 🍺
  en:
    name: Oktoberfest
    style: Märzen / Oktoberfest
    tagline: Brewed in spring, lagered through summer — a crisp Bavarian amber lager for autumn.
    description: |
      This German-style amber lager follows tradition: brewed in the cool of spring, lagered in a cold cellar through the summer months, and enjoyed come autumn at Oktoberfest.

      Rich malt character from Vienna and Munich malts gives it a warm amber colour and a smooth, bready finish. Noble hops keep the bitterness clean and restrained.

      > Best enjoyed after a proper cold lagering period. Patience is the ingredient that makes it great. 🍺
batchVolumeL: 23
mashWaterL: 12
preBoilVolumeL: 27
og: 1057
fg: 1017
mash:
  tempC: 65
  durationMin: 60
boil:
  durationMin: 75
hops:
  - name: Perle
    grams: 27
    alphaAcidPercent: 8.0
    boilMinutes: 75
    expectedIbu: 23.1
  - name: Hallertauer Mittelfrüh
    grams: 5
    alphaAcidPercent: 5.0
    boilMinutes: 30
    expectedIbu: 2.1
malts:
  - name: Vienna Malt
    weightKg: 4
    colorEbc: 9
    expectedSharePercent: 73
  - name: Munich Malt
    weightKg: 0.8
    colorEbc: 18
    expectedSharePercent: 15
  - name: Carapils
    weightKg: 0.75
    colorEbc: 5
    expectedSharePercent: 14
  - name: Caramel Malt
    weightKg: 0.1
    colorEbc: 120
    expectedSharePercent: 2
additions:
  - name: Protofloc
    amount: 1 tsp
    addAt: last 15 min of boil
fermentation:
  tempC: 12
  lageringTempC: 3
  lageringWeeks: 4
  readyWeeks: 5
yeast: Whitelabs WLP820 Oktoberfest
